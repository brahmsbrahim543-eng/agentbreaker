# AgentBreaker — Google Cloud Build Configuration
# Triggers: push to main branch or manual invocation
# Usage: gcloud builds submit --config=deploy/cloudbuild.yaml .

substitutions:
  _REGION: europe-west1
  _REPO: agentbreaker
  _BACKEND_SERVICE: agentbreaker-api
  _FRONTEND_SERVICE: agentbreaker-web
  _SQL_INSTANCE: agentbreaker-db

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── Step 1: Build backend Docker image ──
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
      - -f
      - backend/Dockerfile
      - backend/

  # ── Step 2: Build frontend Docker image ──
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:latest
      - -f
      - frontend/Dockerfile
      - frontend/

  # ── Step 3: Push backend image ──
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    waitFor: ['build-backend']
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend

  # ── Step 4: Push frontend image ──
  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    waitFor: ['build-frontend']
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend

  # ── Step 5: Deploy backend to Cloud Run ──
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    waitFor: ['push-backend']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=2Gi
      - --cpu=2
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --timeout=300
      - --add-cloudsql-instances=$PROJECT_ID:${_REGION}:${_SQL_INSTANCE}
      - --set-env-vars=ENVIRONMENT=production

  # ── Step 6: Deploy frontend to Cloud Run ──
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    waitFor: ['push-frontend']
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --concurrency=200
      - --timeout=60

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/backend:latest
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:latest

timeout: 1800s
