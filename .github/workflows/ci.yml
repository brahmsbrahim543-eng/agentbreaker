name: AgentBreaker CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx aiosqlite bcrypt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          REDIS_URL: "redis://localhost:6379/0"
          SIMULATOR_ENABLED: "false"
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short -x

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install black isort

      - name: Check Black formatting
        run: cd backend && black --check app/ tests/

      - name: Check import sorting
        run: cd backend && isort --check app/ tests/

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          if [ -d "frontend" ] && [ -f "frontend/package.json" ]; then
            cd frontend && npm ci
          else
            echo "No frontend directory found, skipping typecheck"
            exit 0
          fi

      - name: TypeScript type check
        run: |
          if [ -d "frontend" ] && [ -f "frontend/tsconfig.json" ]; then
            cd frontend && npx tsc --noEmit
          else
            echo "No tsconfig.json found, skipping"
          fi
