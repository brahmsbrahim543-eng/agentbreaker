# AgentBreaker Frontend — nginx Configuration
# Serves the SPA and proxies /api to the backend Cloud Run service

# Gzip compression
gzip on;
gzip_vary on;
gzip_min_length 256;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://*.onrender.com wss://*.onrender.com https://*.run.app wss://*.run.app;" always;

    # ── Health check endpoint ──────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── API proxy ──────────────────────────────────────────────────────────────
    # In production, the frontend calls the backend Cloud Run URL directly.
    # This proxy is a fallback for /api calls when BACKEND_URL is not set.
    # The actual backend URL is injected at deploy time via env var.
    #
    # If you want same-origin API calls, set BACKEND_URL as an upstream:
    #   Replace BACKEND_UPSTREAM with the actual Cloud Run backend URL.
    #
    # location /api/ {
    #     proxy_pass ${BACKEND_URL}/api/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_read_timeout 300s;
    #     proxy_connect_timeout 10s;
    # }

    # ── Static assets with caching ─────────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback: all routes serve index.html ──────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # No cache for index.html (always get latest version)
        location = /index.html {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── Deny access to hidden files ────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
